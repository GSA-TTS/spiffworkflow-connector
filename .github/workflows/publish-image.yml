---
name: 2 - Publish & Deploy

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Optional tag name (defaults to branch commit hash)'
        required: false
        type: string
  push:
    branches:
      - main

# Security: restrict GITHUB_TOKEN to least privilege.
# See: https://www.upwind.io/feed/hackerbot-claw-github-actions-pull-request-rce
permissions:
  contents: read
  packages: write

jobs:
  ghcr_publish:
    name: Publish Images on GHCR
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      
      - name: Determine image tag
        id: tag
        env:
          TAG_NAME: ${{ inputs.tag_name }}
          GIT_REF: ${{ github.ref }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ -n "$TAG_NAME" ]; then
              echo "image_tag=$TAG_NAME" >> $GITHUB_OUTPUT
            else
              echo "image_tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
            fi
          else
            echo "image_tag=latest" >> $GITHUB_OUTPUT
          fi
          
          if [ "$GIT_REF" == "refs/heads/main" ]; then
            echo "is_main=true" >> $GITHUB_OUTPUT
          else
            echo "is_main=false" >> $GITHUB_OUTPUT
          fi
      
      - name: login to ghcr
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Publish Spiffworkflow-Connector (from main)
        if: steps.tag.outputs.is_main == 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/gsa-tts/spiffworkflow-connector:latest
            ghcr.io/gsa-tts/spiffworkflow-connector:${{ github.sha }}
          platforms: linux/amd64, linux/arm64
      
      - name: Publish Spiffworkflow-Connector (from branch)
        if: steps.tag.outputs.is_main == 'false'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/gsa-tts/spiffworkflow-connector:${{ steps.tag.outputs.image_tag }}
          platforms: linux/amd64, linux/arm64
