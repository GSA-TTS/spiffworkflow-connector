---
name: 2 - Publish & Deploy

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Optional tag name (defaults to branch commit hash)'
        required: false
        type: string
  push:
    branches:
      - main

# Security: restrict GITHUB_TOKEN to least privilege.
# See: https://www.upwind.io/feed/hackerbot-claw-github-actions-pull-request-rce
permissions:
  contents: read
  packages: write

jobs:
  ghcr_publish:
    name: Publish Images on GHCR
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      
      - name: Determine image tag
        id: tag
        env:
          TAG_NAME: ${{ inputs.tag_name }}
          GIT_REF: ${{ github.ref }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ -n "$TAG_NAME" ]; then
              echo "image_tag=$TAG_NAME" >> $GITHUB_OUTPUT
            else
              echo "image_tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
            fi
          else
            echo "image_tag=latest" >> $GITHUB_OUTPUT
          fi
          
          if [ "$GIT_REF" == "refs/heads/main" ]; then
            echo "is_main=true" >> $GITHUB_OUTPUT
          else
            echo "is_main=false" >> $GITHUB_OUTPUT
          fi
      
      - name: login to ghcr
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Publish Spiffworkflow-Connector (from main)
        if: steps.tag.outputs.is_main == 'true'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/gsa-tts/spiffworkflow-connector:latest
            ghcr.io/gsa-tts/spiffworkflow-connector:${{ github.sha }}
          platforms: linux/amd64, linux/arm64
      
      - name: Publish Spiffworkflow-Connector (from branch)
        if: steps.tag.outputs.is_main == 'false'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/gsa-tts/spiffworkflow-connector:${{ steps.tag.outputs.image_tag }}
          platforms: linux/amd64, linux/arm64
